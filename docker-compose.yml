services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindspace-app
    init: true
    ports:
      - "8001:8001"
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-2.5-flash}
      LOCAL_LLM_MODEL_NAME: ${LOCAL_LLM_MODEL_NAME:-Qwen/Qwen2.5-0.5B-Instruct}
      LOCAL_LLM_MAX_NEW_TOKENS: ${LOCAL_LLM_MAX_NEW_TOKENS:-256}
      TOTAL_QUESTIONS: ${TOTAL_QUESTIONS:-5}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SER_LOAD_TIMEOUT: ${SER_LOAD_TIMEOUT:-120}
      XDG_CACHE_HOME: /app/.cache
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
      TORCH_HOME: /app/.cache/torch
    volumes:
      - hf_cache:/app/.cache/huggingface
      - torch_cache:/app/.cache/torch
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  asset-prep:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - setup
    init: true
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-2.5-flash}
      LOCAL_LLM_MODEL_NAME: ${LOCAL_LLM_MODEL_NAME:-Qwen/Qwen2.5-0.5B-Instruct}
      LOCAL_LLM_MAX_NEW_TOKENS: ${LOCAL_LLM_MAX_NEW_TOKENS:-256}
      TOTAL_QUESTIONS: ${TOTAL_QUESTIONS:-5}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SER_LOAD_TIMEOUT: ${SER_LOAD_TIMEOUT:-120}
      XDG_CACHE_HOME: /app/.cache
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
      TORCH_HOME: /app/.cache/torch
    volumes:
      - hf_cache:/app/.cache/huggingface
      - torch_cache:/app/.cache/torch
    command: ["python", "scripts/prepare_offline_assets.py"]

volumes:
  hf_cache:
  torch_cache:
